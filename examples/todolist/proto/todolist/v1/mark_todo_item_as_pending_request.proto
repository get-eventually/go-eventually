syntax = "proto3";

package todolist.v1;

// MarkTodoItemAsPendingRequest marks an item in a TodoList as pending
// (i.e., undoes a previous "mark as done").
message MarkTodoItemAsPendingRequest {
  // UUID of the list that owns the item.
  string todo_list_id = 1;
  // UUID of the item to mark as pending.
  string todo_item_id = 2;
}
