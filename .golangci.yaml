---
version: "2"

run:
  timeout: 5m
  go: "1.26"

linters:
  default: none
  enable:
    - asasalint
    - bidichk
    - bodyclose
    - contextcheck
    - copyloopvar
    - dogsled
    - durationcheck
    - errcheck
    - errname
    - errorlint
    - exhaustive
    - exhaustruct
    - exptostd
    - fatcontext
    - funlen
    - gochecknoinits
    - gocognit
    - goconst
    - gocritic
    - gocyclo
    - godot
    - gomodguard
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - intrange
    - lll
    - makezero
    - misspell
    - mnd
    - modernize
    - nakedret
    - nestif
    - nilerr
    - nilnesserr
    - noctx
    - nolintlint
    - perfsprint
    - prealloc
    - reassign
    - recvcheck
    - revive
    - rowserrcheck
    - spancheck
    - sqlclosecheck
    - staticcheck
    - tagliatelle
    - testifylint
    - testpackage
    - thelper
    - tparallel
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - usetesting
    - wastedassign
    - whitespace
    - wsl_v5
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    errorlint:
      errorf: true
      asserts: true
      comparison: true
    gocritic:
      disabled-checks:
        - dupImport
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    gocyclo:
      min-complexity: 20
    gomodguard:
      blocked:
        modules:
          - github.com/golang/protobuf:
              recommendations:
                - google.golang.org/protobuf
    lll:
      line-length: 160
    misspell:
      locale: US
    perfsprint:
      int-conversion: true
      err-error: true
      errorf: true
      sprintf1: true
      strconcat: true
    tagliatelle:
      case:
        rules:
          json: snake
    testifylint:
      enable-all: true
    unparam:
      check-exported: true
    unused:
      exported-fields-are-used: false
    varnamelen:
      ignore-names:
        - err
        - tc
        - id
  exclusions:
    generated: lax
    rules:
      - linters:
          - exhaustruct
          - funlen
        path: _test\.go
    paths:
      - third_party$
      - builtin$

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gci
    - gofumpt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/get-eventually/go-eventually)
    goimports:
      local-prefixes:
        - github.com/get-eventually/go-eventually
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
